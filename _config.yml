# seamspace Blog
title: seamspace Blog
description: "seamspace - 새로운 기능 소개, 사용 사례, 그리고 더 많은 이야기"
url: "https://blog.seamspace.site"
baseurl: ""

# Brand
brand_color: "#9B7FD4"
brand_color_light: "#C4B5E3"
brand_color_dark: "#6B4FA0"

# Build
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Collections for i18n
defaults:
  - scope:
      path: "_posts/ko"
      type: "posts"
    values:
      layout: "post"
      lang: "ko"
      permalink: /ko/:title/
  - scope:
      path: "_posts/en"
      type: "posts"
    values:
      layout: "post"
      lang: "en"
      permalink: /en/:title/

# SEO / OG defaults
logo: /assets/images/logo2.png
twitter:
  card: summary_large_image
social:
  name: seamspace
  links:
    - https://www.seamspace.site

# Language navigation
languages:
  ko:
    label: "한국어"
    icon: "🇰🇷"
  en:
    label: "English"
    icon: "🇺🇸"

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
